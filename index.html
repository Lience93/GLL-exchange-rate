<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咕辘辘跨境电商汇率换算工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.12), 0 4px 10px rgba(0,0,0,.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
    line-height: 1.5;
  }

  .container {
    max-width: 860px;
    width: 100%;
  }

  /* Header */
  .header {
    margin-bottom: 28px;
    text-align: center;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header .sub {
    margin-top: 6px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .header .rate-info {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 18px;
    display: inline-flex;
    gap: 18px;
    box-shadow: var(--shadow);
  }
  .rate-info .rate-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .rate-info .rate-item .flag { font-size: 15px; }
  .rate-info .rate-item .val { font-weight: 600; color: var(--text); }

  /* Loading / Error */
  .loading-state, .error-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 15px;
  }
  .error-state { color: #dc2626; }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Table */
  .date-bar {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 6px;
    padding: 6px 14px;
  }
  .table-hint {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 12px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .table-wrapper {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  thead th {
    background: #f8fafc;
    border-bottom: 2px solid var(--border);
    padding: 12px 14px;
    text-align: right;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  .th-curr { display: block; }
  .th-time { display: block; font-weight: 400; font-size: 11px; color: #94a3b8; margin-top: 2px; letter-spacing: 0; }
  thead th { line-height: 1.3; cursor: pointer; }
  tbody td {
    padding: 10px 14px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums; cursor: pointer;
    transition: background .15s, color .15s;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody td:hover {
    background: #eef2ff;
    color: var(--primary);
  }
  .cny-col { color: var(--text); }
  tbody td.cny-col:hover { background: #f1f5f9; color: #1e293b; }
  .usd-col { color: #059669; }
  .krw-col { color: #d97706; }
  .mxn-col { color: #7c3aed; }

  /* Modal Overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, .45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: opacity .2s, visibility .2s;
  }
  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }
  .modal {
    background: var(--surface);
    border-radius: 12px;
    width: 420px;
    max-width: 92vw;
    box-shadow: var(--shadow-lg);
    padding: 28px 24px 24px;
    transform: translateY(12px);
    max-height: 90vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    transition: transform .2s;
  }
  .modal-overlay.active .modal { transform: translateY(0); }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-header h2 {
    font-size: 18px;
    font-weight: 700;
  }
  .modal-close {
    width: 32px; height: 32px;
    border: none;
    background: transparent;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-size: 20px;
    transition: background .15s, color .15s;
  }
  .modal-close:hover { background: #f1f5f9; color: var(--text); }
  .quick-add {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .qa-btn {
    flex: 1;
    min-width: 48px;
    padding: 5px 0;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
  }
  .qa-btn:hover {
    background: #f1f5f9;
    border-color: var(--primary);
    color: var(--primary);
  }
  .qa-btn:active {
    background: #e2e8f0;
  }
  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-top: 2px;
  }
  .np-btn {
    padding: 10px 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background .12s, border-color .12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .np-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
  .np-btn:active { background: #e2e8f0; }
  .np-del { font-size: 16px; color: #dc2626; }
  .np-clear { font-size: 14px; font-weight: 700; color: #dc2626; }
  .np-dot { font-size: 18px; font-weight: 700; }
  .np-zero { grid-column: span 2; }
  .np-confirm {
    border-color: var(--primary);
    background: var(--primary);
    color: #fff;
    font-weight: 600;
  }
  .np-confirm:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .np-confirm:active { background: #1d4ed8; }  /* Calculator */
  .calc {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .calc-display {
    background: #1e293b;
    color: #f8fafc;
    padding: 10px 14px;
    text-align: right;
    min-height: 64px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 2px;
  }
  .calc-expr {
    font-size: 12px;
    color: #94a3b8;
    min-height: 16px;
    word-break: break-all;
    line-height: 1.3;
  }
  .calc-result {
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .calc-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
  }
  .calc-btn {
    padding: 12px 0;
    border: none;
    background: var(--surface);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background .1s;
    user-select: none;
    -webkit-user-select: none;
  }
  .calc-btn:active { background: #e2e8f0; }
  .calc-op {
    background: #f8fafc;
    font-size: 18px;
    color: var(--primary);
    font-weight: 600;
  }
  .calc-op:active { background: #dbeafe; }
  .calc-eq {
    background: var(--primary);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
  }
  .calc-eq:active { background: var(--primary-hover); }
  .calc-fn { color: #dc2626; font-weight: 600; }
  .calc-fn:active { background: #fee2e2; }

  /* History */
  .calc-history {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .calc-history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    background: #f8fafc;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }
  .calc-history-header:hover { background: #f1f5f9; }
  .calc-history-body {
    max-height: 120px;
    overflow-y: auto;
    padding: 4px 0;
  }
  .calc-history-body.collapsed { display: none; }
  .calc-history-item {
    display: flex;
    justify-content: space-between;
    padding: 3px 10px;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .calc-history-item .h-expr { color: var(--text-secondary); }
  .calc-history-item .h-result { color: var(--text); font-weight: 600; }
  .calc-history-item:hover { background: #f8fafc; }
  .calc-history-empty {
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
  }



  .modal-body { display: flex; flex-direction: column; gap: 14px; }
  .form-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .form-row label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .form-row input, .form-row select {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .15s;
  }
  .form-row input:focus, .form-row select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,.15);
  }
  .amount-row {
    display: flex;
    gap: 6px;
  }
  .amount-row input { flex: 1; }
  .calc-toggle {
    width: 36px;
    min-width: 36px;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, border-color .15s, color .15s;
  }
  .calc-toggle:hover {
    background: #f1f5f9;
    border-color: var(--primary);
    color: var(--primary);
  }
  .calc-toggle.active {
    background: #eef2ff;
    border-color: var(--primary);
    color: var(--primary);
  }
  .calc-wrap {
    overflow: hidden;
    max-height: 500px;
    transition: max-height .25s ease, opacity .2s;
    opacity: 1;
  }
  .calc-wrap.collapsed {
    max-height: 0;
    opacity: 0;
    margin: 0;
  }
  .modal-result {
    margin-top: 8px;
    padding: 14px 16px;
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.6;
  }
  .modal-result .result-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-result .result-line + .result-line { margin-top: 6px; }
  .modal-result .result-label { color: var(--text-secondary); font-size: 13px; }
  .modal-result .result-val {
    font-weight: 700;
    font-variant-numeric: tabular-nums; cursor: pointer;
  }

  /* Footer */
  .footer {
    margin-top: 12px;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
  }

  @media (max-width: 540px) {
    body { padding: 20px 8px; }
    .header h1 { font-size: 21px; }
    .rate-info { flex-wrap: wrap; justify-content: center; gap: 10px; }
    table { font-size: 13px; }
    thead th, tbody td { padding: 8px 10px; }
    .modal { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>咕辘辘跨境电商汇率换算工具</h1>
    <div class="sub">实时人民币兑换汇率对照表</div>
    <div class="rate-info" id="rateInfo"></div>
    <div class="date-bar" id="dateBar"></div>
  </div>

  <div id="tableContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <div>正在获取实时汇率…</div>
    </div>
  </div>

  <div class="footer">数据来源: ExchangeRate-API &middot; 汇率每分钟更新</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle">兑换</h2>
      <button class="modal-close" id="modalClose" aria-label="关闭">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label for="modalAmount">金额</label>
        <div class="amount-row">
          <input type="text" id="modalAmount" inputmode="none" onfocus="this.select()" placeholder="0">
          <button class="calc-toggle" id="calcToggle" title="计算器">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="8" y2="18"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="quick-add">
        <button class="qa-btn" data-add="10000">+10000</button>
        <button class="qa-btn" data-add="1000">+1000</button>
        <button class="qa-btn" data-add="100">+100</button>
        <button class="qa-btn" data-add="10">+10</button>
      </div>
      <div class="calc-wrap collapsed" id="calcWrap">
        <div class="calc">
          <div class="calc-display">
            <div class="calc-expr" id="calcExpr"></div>
            <div class="calc-result" id="calcResult">0</div>
          </div>
          <div class="calc-buttons">
            <button class="calc-btn calc-fn" data-calc="clear">C</button>
            <button class="calc-btn calc-fn" data-calc="backspace">&larr;</button>
            <button class="calc-btn calc-op" data-calc="/">&divide;</button>
            <button class="calc-btn calc-op" data-calc="*">&times;</button>
            <button class="calc-btn" data-calc="7">7</button>
            <button class="calc-btn" data-calc="8">8</button>
            <button class="calc-btn" data-calc="9">9</button>
            <button class="calc-btn calc-op" data-calc="-">&minus;</button>
            <button class="calc-btn" data-calc="4">4</button>
            <button class="calc-btn" data-calc="5">5</button>
            <button class="calc-btn" data-calc="6">6</button>
            <button class="calc-btn calc-op" data-calc="+">+</button>
            <button class="calc-btn" data-calc="1">1</button>
            <button class="calc-btn" data-calc="2">2</button>
            <button class="calc-btn" data-calc="3">3</button>
            <button class="calc-btn calc-eq" data-calc="=">=</button>
            <button class="calc-btn" data-calc="0">0</button>
            <button class="calc-btn" data-calc=".">.</button>
          </div>
        </div>
      </div>
      <div class="calc-history" id="calcHistory">
        <div class="calc-history-header" id="calcHistoryToggle">
          <span>计算历史</span>
          <span id="calcHistoryCount" style="font-size:11px">0</span>
        </div>
        <div class="calc-history-body collapsed" id="calcHistoryBody">
          <div class="calc-history-empty">暂无记录</div>
        </div>
      </div>
      <div class="form-row">
        <label for="modalSource">源币种</label>
        <select id="modalSource">
          <option value="CNY">人民币 (CNY)</option>
          <option value="USD">美元 (USD)</option>
          <option value="KRW">韩元 (KRW)</option>
          <option value="MXN">墨西哥比索 (MXN)</option>
        </select>
      </div>
      <div class="form-row">
        <label for="modalTarget">目标币种</label>
        <select id="modalTarget">
          <option value="CNY">人民币 (CNY)</option>
          <option value="USD">美元 (USD)</option>
          <option value="KRW">韩元 (KRW)</option>
          <option value="MXN">墨西哥比索 (MXN)</option>
        </select>
      </div>
      <div class="modal-result" id="modalResult"></div>
    </div>
  </div>
</div>

<script>
const CURRENCIES = {
  CNY: { name: "人民币", symbol: "¥", flag: "🇨🇳", char: "RMB", tz: "Asia/Shanghai" },
  USD: { name: "美元", symbol: "$", flag: "🇺🇸", char: "USD", tz: "America/New_York" },
  KRW: { name: "韩元", symbol: "₩", flag: "🇰🇷", char: "KRW", tz: "Asia/Seoul" },
  MXN: { name: "墨西哥比索", symbol: "Mex$", flag: "🇲🇽", char: "MXN", tz: "America/Mexico_City" },
};
const COL_CLASSES = { CNY: 'cny-col', USD: 'usd-col', KRW: 'krw-col', MXN: 'mxn-col' };
const DISPLAY_ORDER = ['CNY', 'USD', 'KRW', 'MXN'];

let rates = {}; // { CNY: 1, USD: 0.147, KRW: 225.28, MXN: 2.57 }
let lastUpdated = '';

async function fetchRates() {
  const res = await fetch('https://api.exchangerate-api.com/v4/latest/CNY');
  if (!res.ok) throw new Error('获取汇率失败');
  const data = await res.json();
  lastUpdated = data.date;
  rates = {
    CNY: 1,
    USD: data.rates.USD,
    KRW: data.rates.KRW,
    MXN: data.rates.MXN,
  };
}

function convert(amount, from, to) {
  if (!rates[from] || !rates[to]) return 0;
  const inCNY = amount / rates[from]; // convert to CNY base
  return inCNY * rates[to];
}

function fmt(value, code) {
  if (value === 0) return '0';
  const decimals = code === 'KRW' ? 0 : 2;
  return value.toLocaleString('zh-CN', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function timeStr(tz) {
  const now = new Date();
  const opts = { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false };
  const time = now.toLocaleString('zh-CN', opts);
  const mmdd = now.toLocaleString('en-US', { timeZone: tz, month: '2-digit', day: '2-digit' });
  const parts = new Intl.DateTimeFormat('en', { timeZone: tz, timeZoneName: 'short' }).formatToParts(now);
  const tzAbbr = parts.find(p => p.type === 'timeZoneName')?.value || '';
  return { time, mmdd, tz: tzAbbr };
}

// Lunar date lookup using known Chinese New Year dates
const LUNAR_MONTH_NAMES = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const LUNAR_DAY_NAMES = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
const TIAN_GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DI_ZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const SHENG_XIAO = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];

function ganzhi(year) {
  var g = (year - 4) % 10;
  var d = (year - 4) % 12;
  return TIAN_GAN[g] + DI_ZHI[d] + '年（' + SHENG_XIAO[d] + '年）';
}

var LUNAR_YEARS = {};
function initLunarYears() {
  var data = [
    [2023, {month:1, day:22}, [29,29,30,29,30,29,30,30,29,30,29,30], 2, 29],
    [2024, {month:2, day:10}, [30,30,29,30,29,30,29,30,29,30,29,30], 0, 0],
    [2025, {month:1, day:29}, [29,30,29,30,30,29,30,29,30,29,30,29], 6, 30],
    [2026, {month:2, day:17}, [29,30,29,29,30,30,30,29,29,29,29,29], 0, 0],
    [2027, {month:2, day:6}, [30,29,29,30,29,30,29,30,30,29,30,29], 4, 29],
    [2028, {month:1, day:26}, [29,29,30,29,30,30,29,30,29,30,29,30], 0, 0],
    [2029, {month:2, day:13}, [29,30,29,30,29,30,30,29,30,29,30,29], 6, 30],
  ];
  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    LUNAR_YEARS[d[0]] = {cny: new Date(d[0], d[1].month-1, d[1].day), monthDays: d[2], leapMonth: d[3], leapDays: d[4]};
  }
}
initLunarYears();

function solar2lunar(year, month, day) {
  var info = LUNAR_YEARS[year];
  if (!info) return null;
  var target = new Date(year, month - 1, day);
  var diff = Math.floor((target - info.cny) / 86400000);
  if (diff < 0) {
    var prevInfo = LUNAR_YEARS[year - 1];
    if (!prevInfo) return null;
    var prevCny = prevInfo.cny;
    diff = Math.floor((target - prevCny) / 86400000);
    var prevTotal = 0;
    for (var m = 0; m < 12; m++) prevTotal += prevInfo.monthDays[m];
    if (prevInfo.leapMonth > 0) prevTotal += prevInfo.leapDays;
    if (diff < prevTotal) return calcLunarMonthDay(prevInfo, diff, year - 1);
    return calcLunarMonthDay(prevInfo, prevTotal - 1, year - 1);
  }
  return calcLunarMonthDay(info, diff, year);
}

function calcLunarMonthDay(info, diff, year) {
  var remaining = diff;
  if (info.leapMonth > 0) {
    var beforeLeap = 0;
    for (var m = 0; m < info.leapMonth; m++) beforeLeap += info.monthDays[m];
    if (remaining < beforeLeap) return findMonth(0, info.leapMonth, remaining, year, false, info);
    else if (remaining < beforeLeap + info.leapDays) {
      var ld = remaining - beforeLeap;
      return {year: year, month: info.leapMonth, day: ld + 1, isLeap: true,
        monthName: '闰' + LUNAR_MONTH_NAMES[info.leapMonth - 1] + '月',
        dayName: LUNAR_DAY_NAMES[ld] || (ld + 1) + '日'};
    } else {
      remaining -= (beforeLeap + info.leapDays);
      return findMonth(info.leapMonth, 12, remaining, year, false, info);
    }
  }
  return findMonth(info.leapMonth, 12, remaining, year, false, info);
}

function findMonth(startMonth, endMonth, remaining, year, isLeap, info) {
  for (var m = startMonth; m < endMonth; m++) {
    if (remaining < info.monthDays[m]) {
      return {year: year, month: m + 1, day: remaining + 1, isLeap: isLeap,
        monthName: LUNAR_MONTH_NAMES[m] + '月',
        dayName: LUNAR_DAY_NAMES[remaining] || (remaining + 1) + '日'};
    }
    remaining -= info.monthDays[m];
  }
  return null;
}

function buildTable() {
  const container = document.getElementById('tableContainer');

  function defaultAmount(code) {
    if (code === 'CNY') return 100;
    if (code === 'KRW') return 1000;
    if (code === 'USD' || code === 'MXN') return 10;
    return 1;
  }
  function thHtml(code) {
    const t = timeStr(CURRENCIES[code].tz);
    return `<th onclick="openModal(${defaultAmount(code)}, '${code}')"><span class="th-curr">${CURRENCIES[code].flag} ${CURRENCIES[code].char}</span><span class="th-time" data-tz="${CURRENCIES[code].tz}">${t.mmdd} ${t.time}</span></th>`;
  }
  const headerCols = DISPLAY_ORDER.map(thHtml).join('');

  const rows = [];
  for (let rmb = 50; rmb <= 1000; rmb += 50) {
    const cells = DISPLAY_ORDER.map((code, idx) => {
      if (code === 'CNY') {
        return `<td class="${COL_CLASSES[code]}" onclick="openModal(${rmb}, 'CNY')">${rmb}</td>`;
      }
      const val = convert(rmb, 'CNY', code);
      return `<td class="${COL_CLASSES[code]}" onclick="openModal(${val}, '${code}')">${CURRENCIES[code].symbol}${fmt(val, code)}</td>`;
    }).join('');
    rows.push(`<tr>${cells}</tr>`);
  }

  const today = new Date();
  const dateStr = today.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  const weekdayStr = '星期' + weekdays[today.getDay()];
  const lunar = solar2lunar(today.getFullYear(), today.getMonth() + 1, today.getDate());
  const lunarStr = lunar ? `农历${lunar.monthName}${lunar.dayName}` : '';
  document.getElementById('dateBar').textContent = dateStr + ' ' + weekdayStr + (lunarStr ? ' \u00b7 ' + lunarStr : '');

  container.innerHTML = `
    <div class="table-hint">点击货币名称或任意金额，查看该币种与其他币种的兑换</div>
    <div class="table-wrapper">
      <table>
        <thead><tr>${headerCols}</tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>
  `;

  // Update rate info bar
  const infoEl = document.getElementById('rateInfo');
  const parts = DISPLAY_ORDER.filter(c => c !== 'CNY').map(code => {
    const rate = rates[code];
    const perCNY = 1 / rate;
    const decimals = code === 'KRW' ? 4 : 2;
    const fmtRate = perCNY.toLocaleString('zh-CN', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
    return `<span class="rate-item">${CURRENCIES[code].flag} 1 ${CURRENCIES[code].char} = ¥${fmtRate}</span>`;
  });
  const updateStr = lastUpdated ? `更新于 ${lastUpdated}` : '';
  infoEl.innerHTML = parts.join('<span style="color:var(--border)">|</span>') +
    `<span style="color:var(--text-secondary);font-size:12px;margin-left:4px">${updateStr ? '· '+updateStr : ''}</span>`;
}

// Update header time strings
function updateHeaderTimes() {
  document.querySelectorAll('.th-time').forEach(el => {
    const tz = el.dataset.tz;
    if (tz) {
      const t = timeStr(tz);
      el.textContent = `${t.mmdd} ${t.time}`;
    }
  });
}

// Modal logic
let currentSourceCode = 'CNY';

function openModal(amount, sourceCode) {
  currentSourceCode = sourceCode;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('modalAmount').value = amount;
  document.getElementById('modalSource').value = sourceCode;
  document.getElementById('modalTarget').value = 'CNY';
  document.getElementById('modalTitle').textContent =
    `${CURRENCIES[sourceCode].flag} ${CURRENCIES[sourceCode].char} → ?`;
  updateModalResult();
  calcState.current = String(amount);
  calcState.previous = null;
  calcState.operator = null;
  calcState.justCalculated = false;
  updateCalcDisplay();
  // Collapse calculator by default
  document.getElementById('calcWrap').classList.add('collapsed');
  document.getElementById('calcToggle').classList.remove('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function updateModalResult() {
  const amount = parseFloat(document.getElementById('modalAmount').value);
  const src = document.getElementById('modalSource').value;
  const tgt = document.getElementById('modalTarget').value;
  const resultEl = document.getElementById('modalResult');

  if (isNaN(amount) || amount < 0) amount = 0;

  // Always show all target currencies for convenience
  const targets = DISPLAY_ORDER.filter(c => c !== src);
  const lines = targets.map(code => {
    const val = convert(amount, src, code);
    const sym = CURRENCIES[code].symbol;
    const fmtVal = fmt(val, code);
    const isSelected = code === tgt;
    return `<div class="result-line"${isSelected ? ' style="font-size:17px;background:#dbeafe;margin:-4px -6px;padding:4px 6px;border-radius:6px"' : ''}>
      <span class="result-label">${CURRENCIES[code].flag} ${CURRENCIES[code].char}</span>
      <span class="result-val" style="color:${isSelected ? 'var(--primary)' : 'var(--text)'}">${sym}${fmtVal}</span>
    </div>`;
  }).join('');

  resultEl.innerHTML = lines;
}

// Event bindings
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('modalAmount').addEventListener('input', updateModalResult);
document.getElementById('modalSource').addEventListener('change', () => {
  const src = document.getElementById('modalSource').value;
  document.getElementById('modalTitle').textContent =
    `${CURRENCIES[src].flag} ${CURRENCIES[src].char} → ?`;
  updateModalResult();
});
document.getElementById('modalTarget').addEventListener('change', updateModalResult);

// Quick-add buttons
document.querySelectorAll('.qa-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById('modalAmount');
    const add = parseFloat(btn.dataset.add);
    if (!isNaN(add)) {
      input.value = (parseFloat(input.value) || 0) + add;
      updateModalResult();
    }
  });
});

// Calculator toggle
document.getElementById('calcToggle').addEventListener('click', () => {
  const wrap = document.getElementById('calcWrap');
  const btn = document.getElementById('calcToggle');
  wrap.classList.toggle('collapsed');
  btn.classList.toggle('active');
});

// Calculator
let calcState = {
  current: '0',
  previous: null,
  operator: null,
  justCalculated: false,
  history: []
};

function updateCalcDisplay() {
  const exprEl = document.getElementById('calcExpr');
  const resultEl = document.getElementById('calcResult');
  if (calcState.operator && calcState.previous !== null) {
    const opSymbol = calcState.operator === '*' ? '×' : calcState.operator;
    exprEl.textContent = `${formatCalcNum(calcState.previous)} ${opSymbol}`;
  } else {
    exprEl.textContent = '';
  }
  resultEl.textContent = formatCalcNum(calcState.current);
  // Sync to amount input
  const amt = document.getElementById('modalAmount');
  amt.value = parseFloat(calcState.current) || 0;
  updateModalResult();
}

function formatCalcNum(n) {
  const num = parseFloat(n);
  if (isNaN(num)) return '0';
  return num.toLocaleString('zh-CN', { maximumFractionDigits: 10 });
}

function calcHandleOperator(op) {
  const cur = parseFloat(calcState.current);
  if (calcState.operator && calcState.previous !== null) {
    const prev = calcState.previous;
    let result;
    switch (calcState.operator) {
      case '+': result = prev + cur; break;
      case '-': result = prev - cur; break;
      case '*': result = prev * cur; break;
      case '/': result = cur !== 0 ? prev / cur : 0; break;
      default: result = cur;
    }
    calcState.current = String(result);
    calcState.previous = null;
    calcState.operator = null;
  }
  if (op === '=') {
    // Save to history
    if (calcState.justCalculated) return calcState.current;
    const exprStr = `${formatCalcNum(calcState.previous ?? cur)} ${opSymbol(calcState.operator || '')} ${formatCalcNum(cur)}`;
    const result = calcState.current;
    addHistory(exprStr, result);
  }
  calcState.justCalculated = true;
  updateCalcDisplay();
}

function opSymbol(op) {
  switch(op) { case '*': return '×'; case '/': return '÷'; default: return op; }
}

function addHistory(expr, result) {
  const hist = calcState.history;
  hist.push({ expr, result: formatCalcNum(result) });
  const body = document.getElementById('calcHistoryBody');
  const count = document.getElementById('calcHistoryCount');
  count.textContent = hist.length;
  if (hist.length === 1) {
    body.innerHTML = '';
  }
  const item = document.createElement('div');
  item.className = 'calc-history-item';
  item.innerHTML = `<span class="h-expr">${expr}</span><span class="h-result">${formatCalcNum(result)}</span>`;
  body.appendChild(item);
  body.scrollTop = body.scrollHeight;
}

document.querySelectorAll('.calc-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.calc;
    const cur = calcState.current;

    if (action === 'clear') {
      calcState.current = '0';
      calcState.previous = null;
      calcState.operator = null;
      calcState.justCalculated = false;
      updateCalcDisplay();
      return;
    }

    if (action === 'backspace') {
      if (calcState.justCalculated) {
        calcState.current = '0';
        calcState.justCalculated = false;
      } else {
        calcState.current = cur.length > 1 ? cur.slice(0, -1) : '0';
      }
      updateCalcDisplay();
      return;
    }

    if (['+', '-', '*', '/', '='].includes(action)) {
      const curNum = parseFloat(cur);
      if (action === '=') {
        if (calcState.operator && calcState.previous !== null) {
          const prev = calcState.previous;
          let result;
          switch (calcState.operator) {
            case '+': result = prev + curNum; break;
            case '-': result = prev - curNum; break;
            case '*': result = prev * curNum; break;
            case '/': result = curNum !== 0 ? prev / curNum : 0; break;
          }
          const exprStr = `${formatCalcNum(prev)} ${opSymbol(calcState.operator)} ${formatCalcNum(curNum)}`;
          calcState.current = String(result);
          calcState.previous = null;
          calcState.operator = null;
          calcState.justCalculated = true;
          addHistory(exprStr, result);
          updateCalcDisplay();
        }
      } else {
        // Operator (+, -, *, /)
        if (calcState.operator && calcState.previous !== null && !calcState.justCalculated) {
          // Chain calculation
          const prev = calcState.previous;
          let result;
          switch (calcState.operator) {
            case '+': result = prev + curNum; break;
            case '-': result = prev - curNum; break;
            case '*': result = prev * curNum; break;
            case '/': result = curNum !== 0 ? prev / curNum : 0; break;
          }
          calcState.previous = result;
        } else {
          calcState.previous = parseFloat(cur);
        }
        calcState.operator = action;
        calcState.current = '0';
        calcState.justCalculated = false;
        updateCalcDisplay();
      }
      return;
    }

    // Number or decimal
    if (action === '.') {
      if (calcState.justCalculated) {
        calcState.current = '0.';
        calcState.justCalculated = false;
      } else if (!cur.includes('.')) {
        calcState.current = cur + '.';
      }
    } else {
      // Digit
      if (calcState.justCalculated || cur === '0') {
        calcState.current = action;
        calcState.justCalculated = false;
      } else {
        calcState.current = cur + action;
      }
    }
    updateCalcDisplay();
  });
});

// History toggle
document.getElementById('calcHistoryToggle').addEventListener('click', () => {
  const body = document.getElementById('calcHistoryBody');
  body.classList.toggle('collapsed');
});

// Keyboard shortcut: Esc to close
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Init
(async function init() {
  try {
    await fetchRates();
    buildTable();
    // Update time display every 30 seconds
    setInterval(updateHeaderTimes, 30000);
  } catch (err) {
    document.getElementById('tableContainer').innerHTML =
      `<div class="error-state">❌ ${err.message}。请稍后刷新重试。</div>`;
  }
})();
</script>
